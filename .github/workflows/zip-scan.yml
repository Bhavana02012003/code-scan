name: Salesforce ZIP PMD Scan

on:
  workflow_dispatch:
    inputs:
      zip_path:
        description: "Path of uploaded ZIP"
        required: true
      report_path:
        description: "Report output path"
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Extract ZIP
        run: |
          mkdir project
          unzip "${{ inputs.zip_path }}" -d project

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip pmd.zip
          mv pmd-bin-6.55.0 pmd

      - name: Run PMD Scan
        run: |
          mkdir out

          FA=$(find project -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then
            FA="project"
          fi

          ./pmd/bin/run.sh pmd \
            -d "$FA" \
            -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

      - name: Commit Report
        run: |
          mkdir -p reports
          cp out/report.csv "${{ inputs.report_path }}"

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "PMD Scan Report"
          git push