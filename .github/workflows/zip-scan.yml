name: Salesforce ZIP Scan (Custom Ruleset)

on:
  repository_dispatch:
    types: [zip_scan]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

      - name: Debug Payload
        run: |
          echo "ZIP_URL=${{ github.event.client_payload.zip_url }}"
          echo "REPORT_PATH=${{ github.event.client_payload.report_path }}"
          echo "REPORT_BRANCH=${{ github.event.client_payload.report_branch }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Debug Repo Files
        run: |
          echo "Current directory:"
          pwd

          echo "Repo files:"
          ls -la

          echo "Checking analyzer config:"
          ls -la code-analyzer.yml

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip jq

      - name: Download ZIP
        run: |
          curl -L \
            -H "User-Agent: github-actions" \
            "${{ github.event.client_payload.zip_url }}" \
            -o project.zip

      - name: Unzip project
        run: |
          mkdir -p project
          unzip -q project.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Disable Auto Plugin Install
        run: |
          mkdir -p ~/.sf
          echo '{"plugins":{"autoInstall":false}}' > ~/.sf/sf-config.json

      - name: Install Code Analyzer Plugin
        run: |
          sf plugins uninstall @salesforce/plugin-code-analyzer || true
          sf plugins install @salesforce/plugin-code-analyzer@5.10.0

      - name: Confirm Code Analyzer
        run: sf plugins | grep code-analyzer

      - name: Run Code Analyzer
        run: |
          mkdir -p out

          FA=$(find project -type d -name "force-app" | head -n 1)

          if [ -z "$FA" ]; then
            FA="project"
          fi

          echo "Scanning directory: $FA"

          sf code-analyzer run \
            --workspace "$FA" \
            --config-file code-analyzer.yml \
            --output-file out/report.csv \
            --format csv || true

          echo "Report preview:"
          head -n 20 out/report.csv

      - name: Authenticate with Salesforce
        run: |
          response=$(curl -X POST "https://login.salesforce.com/services/oauth2/token" \
            -d "grant_type=password" \
            -d "client_id=${{ secrets.SF_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.SF_CLIENT_SECRET }}" \
            -d "username=${{ secrets.SF_USERNAME }}" \
            -d "password=${{ secrets.SF_PASSWORD }}${{ secrets.SF_SECURITY_TOKEN }}" )

          SF_ACCESS_TOKEN=$(echo "$response" | jq -r '.access_token')

          if [ -z "$SF_ACCESS_TOKEN" ] || [ "$SF_ACCESS_TOKEN" = "null" ]; then
            echo "Salesforce authentication failed"
            exit 1
          fi

          echo "SF_ACCESS_TOKEN=$SF_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Report to Salesforce
        run: |

          if [ ! -f out/report.csv ]; then
            echo "report.csv not found"
            exit 1
          fi

          curl -X POST "${{ vars.SF_DOMAIN_URL }}/services/data/v61.0/sobjects/ContentVersion" \
            -H "Authorization: Bearer $SF_ACCESS_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "entity_content={\"Title\":\"ZIP_Scan_Report_${{ github.run_id }}\",\"PathOnClient\":\"report.csv\"};type=application/json" \
            -F "VersionData=@out/report.csv;type=text/csv"

      - name: Save report
        run: |
          REPORT_PATH="${{ github.event.client_payload.report_path }}"

          mkdir -p "$(dirname "$REPORT_PATH")"

          cp out/report.csv "$REPORT_PATH"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "$REPORT_PATH"

          git commit -m "PMD report: $REPORT_PATH" || echo "No changes"

          git push