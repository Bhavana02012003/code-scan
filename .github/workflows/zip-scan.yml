name: Salesforce ZIP Scan (PMD)

on:
  repository_dispatch:
    types: [zip_scan]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

      - name: Debug Payload
        run: |
          echo "ZIP_URL=${{ github.event.client_payload.zip_url }}"
          echo "REPORT_PATH=${{ github.event.client_payload.report_path }}"
          echo "REPORT_BRANCH=${{ github.event.client_payload.report_branch }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.report_branch }}

      - name: Debug Repo State
        run: |
          echo "Current branch:"
          git branch
          echo "Repo contents:"
          ls -la

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download ZIP
        run: |
          echo "Downloading ZIP from Salesforce..."

          curl -L \
            -H "User-Agent: github-actions" \
            "${{ github.event.client_payload.zip_url }}" \
            --output project.zip

          echo "Downloaded file:"
          ls -lh project.zip

          echo "File type:"
          file project.zip

      - name: Unzip project
        run: |
          mkdir -p project

          if file project.zip | grep -q "Zip archive"; then
            echo "Valid ZIP file"
            unzip -q project.zip -d project
          else
            echo "ERROR: Not a zip file"
            head project.zip
            exit 1
          fi

          echo "Project structure:"
          ls -la project | head

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-6.55.0 pmd
          chmod +x pmd/bin/run.sh

      - name: Run PMD scan
        run: |
          mkdir -p out

          FA=$(find project -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then FA="project"; fi

          echo "Scanning directory: $FA"

          ./pmd/bin/run.sh pmd \
            -d "$FA" \
            -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

          echo "Report preview:"
          head -n 20 out/report.csv

      - name: Save report
        run: |
          REPORT_PATH="${{ github.event.client_payload.report_path }}"

          mkdir -p "$(dirname "$REPORT_PATH")"

          cp out/report.csv "$REPORT_PATH"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "$REPORT_PATH"

          git commit -m "PMD report: $REPORT_PATH" || echo "No changes"

          git push