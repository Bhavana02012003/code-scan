name: Salesforce ZIP PMD Scan

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: "Public URL to download ZIP"
        required: true
      report_path:
        description: "Repo path to write report (e.g. reports/scan_123.csv)"
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Download ZIP
        run: |
          echo "Downloading ZIP..."
          curl -L "${{ inputs.zip_url }}" -o project.zip
          ls -lh project.zip

      - name: Unzip Project
        run: |
          mkdir -p project
          unzip -q project.zip -d project
          echo "Unzipped:"
          ls -la project | head

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download PMD 6.55.0
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-6.55.0 pmd
          chmod +x pmd/bin/run.sh

      - name: Run PMD (full project)
        run: |
          mkdir -p out

          FA=$(find project -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then
            FA="project"
          fi

          echo "Scanning directory: $FA"

          ./pmd/bin/run.sh pmd \
            -d "$FA" \
            -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

          echo "Report preview:"
          head -n 20 out/report.csv || true

      - name: Commit Report into repo
        run: |
          mkdir -p "$(dirname "${{ inputs.report_path }}")"
          cp out/report.csv "${{ inputs.report_path }}"

          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add "${{ inputs.report_path }}"
          git commit -m "PMD report: ${{ inputs.report_path }}" || echo "No changes to commit"
          git push

      - name: Upload Artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: out/report.csv