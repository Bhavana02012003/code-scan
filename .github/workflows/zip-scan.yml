name: Salesforce ZIP Scan (Custom Ruleset)

on:
  repository_dispatch:
    types: [zip_scan]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

      - name: Debug Payload
        run: |
          echo "ZIP_URL=${{ github.event.client_payload.zip_url }}"
          echo "REPORT_PATH=${{ github.event.client_payload.report_path }}"
          echo "REPORT_BRANCH=${{ github.event.client_payload.report_branch }}"

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js (for ESLint)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install ESLint + LWC Plugins
        run: |
          npm install eslint@10 @eslint/js \
          @lwc/eslint-plugin-lwc \
          @salesforce/eslint-plugin-aura \
          @salesforce/eslint-plugin-lightning \
          eslint-plugin-import \
          eslint-plugin-jest \
          --no-save --legacy-peer-deps

      - name: Debug Repo Files
        run: |
          echo "Current directory:"
          pwd
          echo "Repo files:"
          ls -la
          echo "Checking analyzer config:"
          ls -la code-analyzer.yml

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip jq

      - name: Download ZIP
        run: |
          curl -L \
            -H "User-Agent: github-actions" \
            "${{ github.event.client_payload.zip_url }}" \
            -o project.zip

      - name: Unzip project
        run: |
          mkdir -p project
          unzip -q project.zip -d project

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Salesforce CLI
        run: npm install @salesforce/cli --global

      - name: Disable Auto Plugin Install
        run: |
          mkdir -p ~/.sf
          echo '{"plugins":{"autoInstall":false}}' > ~/.sf/sf-config.json

      - name: Install Code Analyzer Plugin
        run: |
          sf plugins uninstall @salesforce/plugin-code-analyzer || true
          sf plugins install @salesforce/plugin-code-analyzer@5.10.0

      - name: Confirm Code Analyzer
        run: sf plugins | grep code-analyzer

      - name: Debug Workspace
        run: |
          echo "Workspace path:"
          echo "$GITHUB_WORKSPACE"
          echo "Listing repo files:"
          ls -la "$GITHUB_WORKSPACE"
          echo "Check config file:"
          ls -la "$GITHUB_WORKSPACE/code-analyzer.yml"

      - name: Create ESLint Config
        run: |
          cat << 'EOF' > eslint.config.js
          import js from "@eslint/js";
          import lwc from "@lwc/eslint-plugin-lwc";
          import aura from "@salesforce/eslint-plugin-aura";
          import lightning from "@salesforce/eslint-plugin-lightning";
          import importPlugin from "eslint-plugin-import";
          import jest from "eslint-plugin-jest";

          export default [
            js.configs.recommended,
            {
              files: ["**/{lwc,aura}/**/*.js"],
              plugins: {
                "@lwc/lwc": lwc,
                "@salesforce/aura": aura,
                "@salesforce/lightning": lightning,
                import: importPlugin,
                jest: jest
              },
              languageOptions: {
                ecmaVersion: 2023,
                sourceType: "module"
              },
              rules: {
                "no-console": ["error", { allow: ["warn", "error"] }],
                "no-debugger": "error",
                "no-unused-vars": "warn",
                "no-undef": "error",
                "eqeqeq": ["error", "always"],
                "curly": "error",
                "semi": ["error", "always"],

                "@lwc/lwc/no-deprecated": "warn",
                "@lwc/lwc/no-inner-html": "error",
                "@lwc/lwc/no-dupe-class-members": "error"
              }
            }
          ];
          EOF

      - name: Run Code Analyzer
        run: |
          mkdir -p out

          FA=$(find project -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then
            FA="project"
          fi

          echo "Scanning directory: $FA"

          # ESLint config
          cat << 'EOF' > custom-eslint-config.yml
          engines:
            eslint:
              eslint_config_file: eslint.config.js
              disable_javascript_base_config: true
              disable_lwc_base_config: true
          EOF

          # 🔹 1. Run Apex scan
          sf code-analyzer run \
            --workspace "$FA" \
            --config-file "$GITHUB_WORKSPACE/code-analyzer.yml" \
            --output-file out/apex.csv || true

          # 🔹 2. Run LWC scan ONLY for valid files
          find "$FA" \( -name "*.js" -o -name "*.html" \) \
            ! -path "*/node_modules/*" \
            ! -path "*/__tests__/*" > lwc_files.txt

          echo "LWC files to scan:"
          cat lwc_files.txt

          while read file; do
            sf code-analyzer run \
              --workspace "$file" \
              --rule-selector eslint \
              --config-file custom-eslint-config.yml \
              --output-file tmp.csv || true

            if [ -f tmp.csv ]; then
              if [ ! -f out/lwc.csv ]; then
                head -n 1 tmp.csv > out/lwc.csv
              fi
              tail -n +2 tmp.csv >> out/lwc.csv
            fi
          done < lwc_files.txt

          # 🔹 3. Merge reports
          if [ -f out/apex.csv ]; then
            head -n 1 out/apex.csv > out/report.csv
            tail -n +2 out/apex.csv >> out/report.csv
          fi

          if [ -f out/lwc.csv ]; then
            tail -n +2 out/lwc.csv >> out/report.csv
          fi

          echo "Final Report Preview:"
          head -n 20 out/report.csv

      - name: Authenticate with Salesforce
        run: |
          response=$(curl -X POST "https://login.salesforce.com/services/oauth2/token" \
            -d "grant_type=password" \
            -d "client_id=${{ secrets.SF_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.SF_CLIENT_SECRET }}" \
            -d "username=${{ secrets.SF_USERNAME }}" \
            -d "password=${{ secrets.SF_PASSWORD }}${{ secrets.SF_SECURITY_TOKEN }}" )

          SF_ACCESS_TOKEN=$(echo "$response" | jq -r '.access_token')

          if [ -z "$SF_ACCESS_TOKEN" ] || [ "$SF_ACCESS_TOKEN" = "null" ]; then
            echo "Salesforce authentication failed"
            echo "$response"
            exit 1
          fi

          echo "SF_ACCESS_TOKEN=$SF_ACCESS_TOKEN" >> $GITHUB_ENV

      - name: Upload Report to Salesforce
        run: |
          if [ ! -f out/report.csv ]; then
            echo "report.csv not found"
            exit 1
          fi

          curl -X POST "${{ vars.SF_DOMAIN_URL }}/services/data/v61.0/sobjects/ContentVersion" \
            -H "Authorization: Bearer $SF_ACCESS_TOKEN" \
            -H "Content-Type: multipart/form-data" \
            -F "entity_content={\"Title\":\"ZIP_Scan_Report_${{ github.run_id }}\",\"PathOnClient\":\"report.csv\"};type=application/json" \
            -F "VersionData=@out/report.csv;type=text/csv"

      - name: Save report
        run: |
          REPORT_PATH="${{ github.event.client_payload.report_path }}"

          mkdir -p "$(dirname "$REPORT_PATH")"

          cp out/report.csv "$REPORT_PATH"

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add "$REPORT_PATH"
          git commit -m "PMD report: $REPORT_PATH" || echo "No changes"
          git push