name: Remote Code Scan

on:
  repository_dispatch:
    types: [run-zip-scan]

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Decode ZIP
        run: |
          mkdir target
          echo "${{ github.event.client_payload.zip_base64 }}" | base64 -d > project.zip
          unzip project.zip -d target

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-6.55.0 pmd
          chmod +x pmd/bin/run.sh

      - name: Run PMD
        run: |
          mkdir -p out
          FA=$(find target -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then FA="target"; fi

          ./pmd/bin/run.sh pmd -d "$FA" -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

      - name: Commit Report
        run: |
          mkdir -p $(dirname "${{ github.event.client_payload.report_path }}")
          cp out/report.csv "${{ github.event.client_payload.report_path }}"
          git config user.name "orchestrator-bot"
          git config user.email "orchestrator@example.com"
          git add "${{ github.event.client_payload.report_path }}"
          git commit -m "ZIP Scan Report"
          git push

      - name: Emit Status
        run: |
          echo '{"status":"Completed","message":"ZIP scan completed successfully."}' > "${{ github.event.client_payload.report_path }}.status.json"
          git add "${{ github.event.client_payload.report_path }}.status.json"
          git commit -m "ZIP Scan Status"
          git push