name: Remote Code Scan

on:
  repository_dispatch:
    types: [run-zip-scan]

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 🔥 Wait to ensure ZIP commit is available
      - name: Wait for ZIP commit
        run: |
          echo "Waiting for ZIP commit to be available..."
          sleep 10
          git pull origin main

      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Copy ZIP file
        run: |
          ZIP_PATH="${{ github.event.client_payload.zip_path }}"
          echo "ZIP Path: $ZIP_PATH"

          if [ ! -f "$ZIP_PATH" ]; then
            echo "ZIP not found!"
            ls -R
            exit 1
          fi

          cp "$ZIP_PATH" project.zip

      - name: Extract ZIP
        run: |
          mkdir target
          unzip project.zip -d target

      - name: Download PMD
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-6.55.0 pmd
          chmod +x pmd/bin/run.sh

      - name: Run PMD
        run: |
          mkdir -p out

          FA=$(find target -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then
            FA="target"
          fi

          ./pmd/bin/run.sh pmd \
            -d "$FA" \
            -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

      - name: Commit Report
        run: |
          REPORT_PATH="${{ github.event.client_payload.report_path }}"

          mkdir -p $(dirname "$REPORT_PATH")
          cp out/report.csv "$REPORT_PATH"

          git config user.name "scan-bot"
          git config user.email "scan-bot@github.com"

          git add "$REPORT_PATH"

          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "ZIP Scan Report - ${{ github.event.client_payload.correlation_id }}"
            git push
          fi