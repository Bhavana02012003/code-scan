name: Remote ZIP Scan (PMD Full)

on:
  workflow_dispatch:
    inputs:
      zip_base64:
        description: "Base64 ZIP content"
        required: true
      report_path:
        description: "Repo path to write report (e.g. reports/scan_123.csv)"
        required: true

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Print inputs
        run: |
          echo "report_path = ${{ inputs.report_path }}"
          echo "zip_base64 length = $(echo "${{ inputs.zip_base64 }}" | wc -c)"

      - name: Decode ZIP
        run: |
          echo "${{ inputs.zip_base64 }}" | base64 -d > project.zip
          ls -lh project.zip

      - name: Unzip Project
        run: |
          mkdir -p project
          unzip -q project.zip -d project
          echo "Unzipped:"
          ls -la project | head

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Download PMD 6.55.0
        run: |
          curl -L https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip -o pmd.zip
          unzip -q pmd.zip
          mv pmd-bin-6.55.0 pmd
          chmod +x pmd/bin/run.sh

      - name: Run PMD (full project)
        run: |
          mkdir -p out

          # If a Salesforce project exists, scan force-app. Else scan whole project.
          FA=$(find project -type d -name "force-app" | head -n 1)
          if [ -z "$FA" ]; then
            FA="project"
          fi

          echo "Scanning directory: $FA"

          ./pmd/bin/run.sh pmd \
            -d "$FA" \
            -f csv \
            -R category/apex/bestpractices.xml,category/apex/design.xml,category/apex/errorprone.xml,category/apex/performance.xml,category/apex/security.xml \
            > out/report.csv || true

          echo "Report preview:"
          head -n 20 out/report.csv || true

      - name: Write report back into repo (reports/*.csv)
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          REPORT_PATH: ${{ inputs.report_path }}
        run: |
          REPORT_B64=$(base64 -w 0 out/report.csv)

          API="https://api.github.com/repos/$OWNER/$REPO/contents/$REPORT_PATH"

          echo "Uploading report to: $API"

          curl -sS -X PUT \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "Content-Type: application/json" \
            -d "{\"message\":\"PMD report: $REPORT_PATH\",\"content\":\"$REPORT_B64\",\"branch\":\"main\"}" \
            "$API"

      - name: Upload Artifact (optional)
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: out/report.csv